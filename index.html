<!doctype html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="A tourism and travel website with customizable family and cultural plans."
    />
    <title>Without name | Tourism and Travel</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css"
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module">
      const basePath = `${window.location.pathname.replace(/[^/]*$/, "")}`;
      const isLocalDev = ["localhost", "127.0.0.1"].includes(window.location.hostname);
      const script = document.createElement("script");
      script.type = "module";
      script.src = isLocalDev ? `${basePath}src/main.jsx` : `${basePath}assets/main.js`;
      document.body.appendChild(script);

      if (!isLocalDev) {
        const stylesheet = document.createElement("link");
        stylesheet.rel = "stylesheet";
        stylesheet.href = `${basePath}assets/main.css`;
        document.head.appendChild(stylesheet);
      }
    </script>
  </body>
</html>
