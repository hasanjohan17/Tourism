# ينشر الموقع على GitHub Pages عند كل دفع إلى main
# Settings → Pages → Source: GitHub Actions
name: Deploy GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        env:
          VITE_BASE_PATH: /tourism-project/
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_WHATSAPP_E164: ${{ secrets.VITE_WHATSAPP_E164 }}
          VITE_STORAGE_BUCKET_PUBLIC: ${{ secrets.VITE_STORAGE_BUCKET_PUBLIC }}
          VITE_STORAGE_BUCKET_PRIVATE: ${{ secrets.VITE_STORAGE_BUCKET_PRIVATE }}
        run: npm run build

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
